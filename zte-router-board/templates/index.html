<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>网络设备看板 - 我的网络中心</title>
    <link rel="icon" href="static/images/home.svg">
    <script src="static/js/echarts.min.js"></script>
    <script src="static/js/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 1rem;
        }
        @media (min-width: 768px) { body { padding: 2rem; } }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center; color: white; font-size: 1.8rem;
            margin: 1.5rem 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        @media (min-width: 768px) { h1 { font-size: 2.5rem; margin: 2rem 0; } }

        /* 表格外层容器 - 改为半透明白色背景，与图表区统一 */
        .table-wrapper {
            overflow-x: auto;
            background: rgba(255,255,255,0.9);
            padding: 0;
            margin-bottom: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .device-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;  /* 继承父级半透背景 */
            font-size: 0.85rem;
            min-width: 820px;
            border: none;
        }
        .device-table th,
        .device-table td {
            padding: 12px 12px;
            text-align: left;
            vertical-align: middle;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        /* 最后一行单元格取消下边框 */
        .device-table tbody tr:last-child td {
            border-bottom: none;
        }
        .device-table th {
            background: rgba(0,0,0,0.03);
            font-weight: 600;
            color: #1e293b;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .device-table tbody tr:hover {
            background-color: rgba(0,0,0,0.04);
            transition: background-color 0.15s ease;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online { background-color: #22c55e; box-shadow: 0 0 4px #22c55e80; }
        .status-offline { background-color: #ef4444; }
        .device-name {
            font-weight: 600;
            white-space: nowrap;
        }
        .duration-text {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.8rem;
            background: rgba(220,220,220,0.8);
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
        }
        .traffic-text {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-weight: 500;
            white-space: nowrap;
        }
        /* 速率样式调整 - 512KB/s 显示橙色 */
        .speed-normal {
            font-weight: 600;
            color: #1e293b;
        }
        .speed-warning {
            font-weight: 700;
            color: #f97316;
        }
        .speed-critical {
            font-weight: 700;
            color: #dc2626;
        }
        .checkbox-col {
            text-align: center;
            white-space: nowrap;
        }
        .checkbox-col input[type="checkbox"] {
            transform: scale(1.15);
            cursor: pointer;
        }

        /* 流量大小颜色样式 */
        .traffic-512m { color: #f97316; font-weight: 600; }
        .traffic-1g { color: #ea580c; font-weight: 600; }
        .traffic-2g { color: #dc2626; font-weight: 700; }
        .traffic-5g { color: #991b1b; font-weight: 700; }
        .traffic-default { color: #1e293b; }

        /* 图表区域保持原有半透明风格 */
        .charts-section {
            background: rgba(255,255,255,0.9);
            padding: 1rem;
            margin-top: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .table-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            padding: 1rem 1rem 0.5rem 1rem;
        }
        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .time-selector {
            margin: 1rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .time-btn {
            background: rgba(220,220,220,0.9);
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.2s;
            color: #333;
        }
        .time-btn.active {
            background: #4f46e5;
            color: #FFF;
        }
        .chart-box {
            height: 280px;
            width: 100%;
            margin-bottom: 1.2rem;
        }
        @media (min-width: 768px) {
            .chart-box { height: 320px; }
        }
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
        }
        button {
            background: #4f46e5;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        @media (max-width: 640px) {
            .device-table th, .device-table td { padding: 9px 6px; font-size: 0.75rem; }
            .duration-text { font-size: 0.7rem; padding: 2px 5px; }
        }

        /* 限速信息列 */
        .qos-link {
            color: #4f46e5;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
        }
        .qos-link:hover { text-decoration: underline; }
        .qos-limited { line-height: 1.4; }
        .qos-normal { line-height: 2.8; display: inline-block; }

        /* 弹窗遮罩 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 1rem;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-box h3 { margin: 0 0 1rem 0; font-size: 1.1rem; }
        .modal-row {
            display: flex;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .modal-row label { width: 70px; font-size: 0.85rem; }
        .modal-row input[type="number"],
        .modal-row select {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .modal-row { min-height: 36px; }
        .modal-row input[type="checkbox"] { transform: scale(1.2); margin-right: 6px; }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 1.2rem;
        }
        .modal-btns button {
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
        }
        .btn-save { background: #4f46e5; color: #fff; }
        .btn-cancel { background: #e5e7eb; color: #333; }

        /* 全屏加载遮罩 */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-overlay.hidden {
            display: none;
        }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #fff;
            margin-top: 1rem;
            font-size: 1rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 网络设备看板</h1>

    <div class="table-wrapper">
        <div class="table-title">🖥️ 设备列表</div>
        <table class="device-table" id="deviceTable">
            <thead>
                <tr>
                    <th width="40" class="checkbox-col"><input type="checkbox" id="selectAllCheckbox"></th>
                    <th>设备名称</th>
                    <th>在线状态</th>
                    <th>在线/离线时长</th>
                    <th>上行流量</th>
                    <th>下行流量</th>
                    <th>上传速率</th>
                    <th>下载速率</th>
                    <th>限速</th>
                </tr>
            </thead>
            <tbody id="deviceTableBody">
                <tr><td colspan="9" style="text-align:center;padding:2rem 0;color:#64748b;">加载设备中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="charts-section">
        <div class="chart-title">📈 实时速率趋势</div>
        <div class="time-selector" id="timeSelector">
            <span>时间范围：</span>
            <button class="time-btn active" data-minutes="10">最近10分钟</button>
            <button class="time-btn" data-minutes="30">最近30分钟</button>
            <button class="time-btn" data-minutes="60">最近1小时</button>
            <button class="time-btn" data-minutes="360">最近6小时</button>
            <button class="time-btn" data-minutes="1440">最近一天</button>
            <label style="margin-left:12px;cursor:pointer;font-size:0.85rem;display:inline-flex;align-items:center;gap:4px;">
                <input type="checkbox" id="linkChartsCheckbox" checked> 联动图表
            </label>
        </div>
        <div id="downloadChart" class="chart-box"></div>
        <div id="uploadChart" class="chart-box"></div>
    </div>
    <div class="footer-note">数据来源于中兴路由器 · 每{{ fetch_interval }}秒刷新</div>
</div>

<script>
    // ---------- 全局变量 ----------
    let allDevices = [];
    let selectedMacs = new Set();
    let uploadChart, downloadChart;
    let currentTimeRange = 10;  // 默认10分钟
    let refreshTimer = null;
    let tickTimer = null;
    let deviceBaseData = new Map();

    const STORAGE_KEY = 'selected_macs_for_speed_chart';
    const TIME_RANGE_KEY = 'selected_time_range_minutes';
    const LEGEND_STATE_KEY = 'chart_legend_selected_state';
    const LINK_CHARTS_KEY = 'link_charts_enabled';
    let chartLinked = true;  // 默认开启联动

    // 辅助函数
    function formatBytes(bytes) {
        if (bytes === undefined || bytes === null) return '0 B';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
        if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB';
        return (bytes/(1024*1024*1024)).toFixed(2) + ' GB';
    }

    function formatSpeed(kbps) {
        if (kbps === undefined || kbps === null) return '--';
        if (kbps < 1024) return kbps.toFixed(1) + ' KB/s';
        return (kbps/1024).toFixed(1) + ' MB/s';
    }

    // 限速信息显示（Kbps → KB/s 或 MB/s）
    function formatQosLimit(kbps) {
        if (!kbps || kbps === 0) return '0.00 KB/s';
        const kbs = kbps / 8;  // Kbps → KB/s
        if (kbs < 1024) return kbs.toFixed(2) + ' KB/s';
        return (kbs / 1024).toFixed(2) + ' MB/s';
    }

    function renderQosCell(dev) {
        if (!dev.qos_enabled || dev.qos_enabled === 0) {
            return '<a class="qos-link qos-normal" onclick="openQosModal(\'' + dev.mac + '\')">不限速</a>';
        }
        const up = formatQosLimit(dev.qos_max_upload_kbps);
        const down = formatQosLimit(dev.qos_max_download_kbps);
        return '<a class="qos-link qos-limited" onclick="openQosModal(\'' + dev.mac + '\')">'
            + '<span class="qos-up">&#x21E7; ' + up + '</span><br>'
            + '<span class="qos-down">&#x21E9; ' + down + '</span>'
            + '</a>';
    }

    // 根据速率（KB/s）返回样式类 - 调整为512KB/s显示橙色
    function getSpeedClass(kbps) {
        if (kbps === undefined || kbps === null) return 'speed-normal';
        if (kbps >= 1024) return 'speed-critical'; // ≥1MB/s 红色
        if (kbps >= 512) return 'speed-warning';   // ≥512KB/s 橙色
        return 'speed-normal';
    }

    // 根据流量大小返回样式类
    function getTrafficClass(bytes) {
        if (bytes === undefined || bytes === null) return 'traffic-default';
        const bytesInMB = bytes / (1024 * 1024);
        const bytesInGB = bytes / (1024 * 1024 * 1024);

        if (bytesInGB >= 5) return 'traffic-5g'; // 5G及以上
        if (bytesInGB >= 2) return 'traffic-2g'; // 2G及以上
        if (bytesInGB >= 1) return 'traffic-1g'; // 1G及以上
        if (bytesInMB >= 512) return 'traffic-512m'; // 512M及以上
        return 'traffic-default';
    }

    // 时长计算
    function computeCurrentDuration(baseTimeStr, baseDurationSec, isOnline) {
        if (!baseTimeStr || baseDurationSec === undefined) return '--';
        const baseTime = new Date(baseTimeStr.replace(' ', 'T') + '+08:00');
        const now = new Date();
        const diffSeconds = Math.floor((now - baseTime) / 1000);
        let totalSec = baseDurationSec + diffSeconds;
        if (totalSec < 0) totalSec = 0;
        const days = Math.floor(totalSec / 86400);
        const hours = Math.floor((totalSec % 86400) / 3600);
        const mins = Math.floor((totalSec % 3600) / 60);
        const secs = totalSec % 60;
        if (totalSec < 60) {
            return secs + '秒';
        } else if (totalSec < 3600) {
            return mins + '分' + secs + '秒';
        } else if (totalSec < 86400) {
            return hours + '小时' + mins + '分';
        } else {
            return days + '天' + hours + '小时';
        }
    }

    function updateTableDuration(mac) {
        const row = document.querySelector(`tr[data-mac="${mac}"]`);
        if (!row) return;
        const base = deviceBaseData.get(mac);
        if (!base) return;
        const durationCell = row.querySelector('.duration-cell');
        if (durationCell) {
            const newText = computeCurrentDuration(base.baseTimeStr, base.baseDurationSec, base.isOnline);
            durationCell.innerHTML = `<span class="duration-text">${newText}</span>`;
        }
    }

    function tickAllDurations() {
        for (let mac of deviceBaseData.keys()) {
            updateTableDuration(mac);
        }
    }

    async function fetchAllData() {
        try {
            const resp = await axios.post('/api/device-info', {});
            const devices = resp.data.data || [];
            if (!devices.length) {
                const tbody = document.getElementById('deviceTableBody');
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem 0;color:#64748b;">暂无设备，请检查 PRESET_MATCH_LIST</td></tr>';
                return;
            }
            allDevices = devices.map(d => ({
                id: d.id,
                mac: d.macaddress,
                devname: d.devname,
                active: d.active === 1,
                online_duration_sec: d.online_duration_sec,
                offline_duration_sec: d.offline_duration_sec,
                sntp_time: d.sntp_time,
                latest_upload_kbps: d.latest_upload_kbps,
                latest_download_kbps: d.latest_download_kbps,
                latest_bytes_send: d.latest_bytes_send || 0,
                latest_bytes_recv: d.latest_bytes_received || 0,
                qos_enabled: d.qos_enabled || 0,
                qos_max_upload_kbps: d.qos_max_upload_kbps || 0,
                qos_max_download_kbps: d.qos_max_download_kbps || 0
            }));

            // 更新基准时长数据
            for (let dev of allDevices) {
                const baseDuration = dev.active ? dev.online_duration_sec : dev.offline_duration_sec;
                if (dev.sntp_time && baseDuration !== undefined && baseDuration !== null) {
                    const existing = deviceBaseData.get(dev.mac);
                    if (existing) {
                        if (Math.abs(baseDuration - existing.baseDurationSec) > 2) {
                            deviceBaseData.set(dev.mac, {
                                baseTimeStr: dev.sntp_time,
                                baseDurationSec: baseDuration,
                                isOnline: dev.active
                            });
                        }
                    } else {
                        deviceBaseData.set(dev.mac, {
                            baseTimeStr: dev.sntp_time,
                            baseDurationSec: baseDuration,
                            isOnline: dev.active
                        });
                    }
                }
            }

            renderDeviceTable();
            if (selectedMacs.size > 0) await refreshCharts();
        } catch (err) {
            console.error('获取数据失败', err);
        }
    }

    function renderDeviceTable() {
        const tbody = document.getElementById('deviceTableBody');
        if (!allDevices.length) return;
        const sorted = [...allDevices].sort((a,b) => (a.devname || '').localeCompare(b.devname || ''));
        tbody.innerHTML = '';
        sorted.forEach(dev => {
            const isOnline = dev.active;
            const sendBytes = dev.latest_bytes_send;
            const recvBytes = dev.latest_bytes_recv;
            const sendFmt = formatBytes(sendBytes);
            const recvFmt = formatBytes(recvBytes);
            const uploadKbps = dev.latest_upload_kbps;
            const downloadKbps = dev.latest_download_kbps;
            const uploadSpeedFmt = formatSpeed(uploadKbps);
            const downloadSpeedFmt = formatSpeed(downloadKbps);
            const uploadClass = getSpeedClass(uploadKbps);
            const downloadClass = getSpeedClass(downloadKbps);
            const uploadTrafficClass = getTrafficClass(sendBytes);
            const downloadTrafficClass = getTrafficClass(recvBytes);
            const baseData = deviceBaseData.get(dev.mac);
            let durationText = '--';
            if (baseData) {
                durationText = computeCurrentDuration(baseData.baseTimeStr, baseData.baseDurationSec, baseData.isOnline);
            }
            const isChecked = selectedMacs.has(dev.mac);

            const row = document.createElement('tr');
            row.setAttribute('data-mac', dev.mac);
            row.innerHTML = `
                <td class="checkbox-col">
                    <input type="checkbox" class="device-checkbox" data-mac="${dev.mac}" ${isChecked ? 'checked' : ''}>
                </td>
                <td class="device-name">${escapeHtml(dev.devname)}</td>
                <td><span class="status-indicator ${isOnline ? 'status-online' : 'status-offline'}"></span>${isOnline ? '在线' : '离线'}</td>
                <td class="duration-cell"><span class="duration-text">${durationText}</span></td>
                <td class="traffic-text ${uploadTrafficClass}">${sendFmt}</td>
                <td class="traffic-text ${downloadTrafficClass}">${recvFmt}</td>
                <td class="${uploadClass}">${uploadSpeedFmt}</td>
                <td class="${downloadClass}">${downloadSpeedFmt}</td>
                <td>${renderQosCell(dev)}</td>
            `;
            tbody.appendChild(row);
        });

        // 绑定 checkbox 事件
        document.querySelectorAll('.device-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const mac = cb.dataset.mac;
                if (cb.checked) {
                    selectedMacs.add(mac);
                } else {
                    selectedMacs.delete(mac);
                    clearLegendStateForRemovedMacs([mac]);
                }
                // 更新全选框状态
                updateSelectAllCheckbox();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(selectedMacs)));
                refreshCharts();
            });
        });
    }

    // 更新全选框状态
    function updateSelectAllCheckbox() {
        const allCheckboxes = document.querySelectorAll('.device-checkbox');
        const checkedCount = document.querySelectorAll('.device-checkbox:checked').length;
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');

        if (allCheckboxes.length === 0) {
            selectAllCheckbox.checked = false;
            selectAllCheckbox.indeterminate = false;
        } else if (checkedCount === allCheckboxes.length) {
            selectAllCheckbox.checked = true;
            selectAllCheckbox.indeterminate = false;
        } else if (checkedCount === 0) {
            selectAllCheckbox.checked = false;
            selectAllCheckbox.indeterminate = false;
        } else {
            selectAllCheckbox.indeterminate = true;
        }
    }

    // 绑定全选事件
    function bindSelectAllCheckbox() {
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');
        selectAllCheckbox.addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            const allDeviceCheckboxes = document.querySelectorAll('.device-checkbox');
            const removedMacs = [];

            allDeviceCheckboxes.forEach(cb => {
                cb.checked = isChecked;
                const mac = cb.dataset.mac;
                if (isChecked) {
                    selectedMacs.add(mac);
                } else {
                    selectedMacs.delete(mac);
                    removedMacs.push(mac);
                }
            });

            if (removedMacs.length > 0) {
                clearLegendStateForRemovedMacs(removedMacs);
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(selectedMacs)));
            refreshCharts();
        });
    }

    // 曲线图刷新
    async function refreshCharts() {
        if (selectedMacs.size === 0) {
            uploadChart?.clear();
            downloadChart?.clear();
            uploadChart?.setOption({ title: { text: '未勾选任何设备', left: 'center', top: 'center' } });
            downloadChart?.setOption({ title: { text: '未勾选任何设备', left: 'center', top: 'center' } });
            return;
        }
        const macsArray = Array.from(selectedMacs);

        function formatBeijingTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        const endDate = new Date();
        const endTime = formatBeijingTime(endDate);
        const startDate = new Date(endDate.getTime() - currentTimeRange * 60000);
        const startTimeStr = formatBeijingTime(startDate);

        try {
            const resp = await axios.post('/api/device-speed', {
                macs: macsArray,
                start_sntp_time: startTimeStr,
                end_sntp_time: endTime
            });
            const dataGroup = resp.data.data || {};

            const uploadSeries = [];
            const downloadSeries = [];

            for (let mac of macsArray) {
                const points = dataGroup[mac] || [];
                if (points.length === 0) continue;
                const dev = allDevices.find(d => d.mac === mac);
                const deviceName = dev ? dev.devname : mac.slice(-6);
                const sortedPoints = [...points].sort((a,b) => a.sntp_time.localeCompare(b.sntp_time));
                const uploadData = sortedPoints.map(p => [p.sntp_time, p.upload_kbps]);
                const downloadData = sortedPoints.map(p => [p.sntp_time, p.download_kbps]);

                uploadSeries.push({
                    name: deviceName,
                    type: 'line',
                    smooth: true,
                    data: uploadData,
                    lineStyle: { width: 2 },
                    symbol: 'none'
                });
                downloadSeries.push({
                    name: deviceName,
                    type: 'line',
                    smooth: true,
                    data: downloadData,
                    lineStyle: { width: 2 },
                    symbol: 'none'
                });
            }

            if (uploadSeries.length === 0 && downloadSeries.length === 0) {
                uploadChart?.setOption({ title: { text: '所选时间段内无速率数据', left: 'center', top: 'center' } });
                downloadChart?.setOption({ title: { text: '所选时间段内无速率数据', left: 'center', top: 'center' } });
                return;
            }

            const tooltipSpeedColor = function(kbps) {
                if (kbps === undefined || kbps === null) return '#1e293b';
                if (kbps >= 1024) return '#dc2626';     // ≥1MB/s 红色
                if (kbps >= 512) return '#f97316';      // ≥512KB/s 橙色
                return '#1e293b';                        // 默认
            };

            const commonOption = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        if (!params || params.length === 0) return '';
                        const timeLabel = formatBeijingTime(new Date(params[0].axisValue));
                        let html = '<div style="margin-bottom:4px">' + timeLabel + '</div>';
                        for (let i = 0; i < params.length; i++) {
                            const p = params[i];
                            const kbps = p.value[1];
                            const color = tooltipSpeedColor(kbps);
                            const val = formatSpeed(kbps);
                            html += '<div style="display:flex;align-items:center;min-width:220px">'
                                + p.marker
                                + '<span>' + p.seriesName + '</span>'
                                + '<span style="flex:1"></span>'
                                + '<span style="font-weight:600;color:' + color + '">' + val + '</span>'
                                + '</div>';
                        }
                        return html;
                    }
                },
                xAxis: { type: 'time', name: '时间', axisLabel: { rotate: 30 } },
                yAxis: { type: 'value', name: '速率 (KB/s)' },
                legend: { orient: 'vertical', left: 'left', top: 'middle' },
                grid:  { containLabel: true, top: 40, bottom: 20, left: 60, right: 60 }
            };

            const uploadNames = uploadSeries.map(s => s.name);
            const uploadSelected = getLegendSelected('upload', uploadNames);
            uploadChart.setOption({
                ...commonOption,
                title: { text: '上\n传\n速\n率', left: 15, top: 'middle' },
                series: uploadSeries,
                legend: { data: uploadNames, selected: uploadSelected }
            }, true);

            const downloadNames = downloadSeries.map(s => s.name);
            const downloadSelected = getLegendSelected('download', downloadNames);
            downloadChart.setOption({
                ...commonOption,
                title: { text: '下\n载\n速\n率', left: 15, top: 'middle' },
                series: downloadSeries,
                legend: { data: downloadNames, selected: downloadSelected }
            }, true);

            // 根据联动开关状态 connect 或 disconnect
            if (chartLinked) {
                echarts.connect('speedGroup');
            } else {
                echarts.disconnect('speedGroup');
            }

        } catch (err) {
            console.error('刷新曲线失败', err);
            uploadChart?.setOption({ title: { text: '加载曲线数据失败', left: 'center', top: 'center' } });
            downloadChart?.setOption({ title: { text: '加载曲线数据失败', left: 'center', top: 'center' } });
        }
    }

    function bindTimeSelector() {
        const btns = document.querySelectorAll('.time-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTimeRange = parseInt(btn.dataset.minutes, 10);
                localStorage.setItem(TIME_RANGE_KEY, currentTimeRange);
                if (selectedMacs.size > 0) refreshCharts();
            });
        });
    }

    function restoreTimeRange() {
        const stored = localStorage.getItem(TIME_RANGE_KEY);
        if (stored) {
            const minutes = parseInt(stored, 10);
            if (!isNaN(minutes) && minutes > 0) {
                currentTimeRange = minutes;
                const btns = document.querySelectorAll('.time-btn');
                btns.forEach(b => {
                    b.classList.remove('active');
                    if (parseInt(b.dataset.minutes, 10) === minutes) {
                        b.classList.add('active');
                    }
                });
            }
        }
    }

    function restoreLinkChartsState() {
        const stored = localStorage.getItem(LINK_CHARTS_KEY);
        if (stored !== null) {
            chartLinked = stored === 'true';
            const cb = document.getElementById('linkChartsCheckbox');
            if (cb) cb.checked = chartLinked;
        }
    }

    function bindLinkChartsCheckbox() {
        const cb = document.getElementById('linkChartsCheckbox');
        if (!cb) return;
        cb.addEventListener('change', () => {
            chartLinked = cb.checked;
            localStorage.setItem(LINK_CHARTS_KEY, chartLinked);
            if (chartLinked) {
                // 连接前先同步图例状态：以上传图表的图例为准，覆盖下载图表
                syncLegendForConnect();
                echarts.connect('speedGroup');
            } else {
                echarts.disconnect('speedGroup');
            }
        });
    }

    // 连接联动时，以上传图表的图例状态为准，同步到下载图表
    function syncLegendForConnect() {
        try {
            const stored = localStorage.getItem(LEGEND_STATE_KEY);
            if (!stored) return;
            const allState = JSON.parse(stored);
            const uploadState = allState['upload'];
            if (!uploadState) return;
            // 对齐 localStorage
            allState['download'] = Object.assign({}, uploadState);
            localStorage.setItem(LEGEND_STATE_KEY, JSON.stringify(allState));
            // 立即应用到下载图表
            if (downloadChart) {
                downloadChart.setOption({ legend: { selected: uploadState } });
            }
        } catch(e) {}
    }

    function initCharts() {
        uploadChart = echarts.init(document.getElementById('uploadChart'));
        downloadChart = echarts.init(document.getElementById('downloadChart'));

        // 设置 group，用于 connect/disconnect 联动控制
        uploadChart.group = 'speedGroup';
        downloadChart.group = 'speedGroup';
        if (chartLinked) {
            echarts.connect('speedGroup');
        }

        // 图例切换时保存选中状态到本地缓存
        // 联动开启时，以当前点击的图表为准，强制同步到另一个图表
        let legendSyncLock = false;

        uploadChart.on('legendselectchanged', function(params) {
            if (legendSyncLock) return;
            saveLegendState('upload', params.selected);
            if (chartLinked) {
                legendSyncLock = true;
                downloadChart.setOption({ legend: { selected: params.selected } });
                legendSyncLock = false;
            }
        });
        downloadChart.on('legendselectchanged', function(params) {
            if (legendSyncLock) return;
            saveLegendState('download', params.selected);
            if (chartLinked) {
                legendSyncLock = true;
                uploadChart.setOption({ legend: { selected: params.selected } });
                legendSyncLock = false;
            }
        });

        window.addEventListener('resize', () => { uploadChart?.resize(); downloadChart?.resize(); });
    }

    function saveLegendState(chartKey, selectedMap) {
        try {
            let allState = {};
            const stored = localStorage.getItem(LEGEND_STATE_KEY);
            if (stored) {
                allState = JSON.parse(stored);
            }
            if (chartLinked) {
                // 联动开启时，两个图表图例状态保持一致
                allState['upload'] = selectedMap;
                allState['download'] = selectedMap;
            } else {
                allState[chartKey] = selectedMap;
            }
            localStorage.setItem(LEGEND_STATE_KEY, JSON.stringify(allState));
        } catch(e) {}
    }

    function getLegendSelected(chartKey, currentNames) {
        try {
            const stored = localStorage.getItem(LEGEND_STATE_KEY);
            if (!stored) return {};
            const allState = JSON.parse(stored);
            const saved = allState[chartKey] || {};
            // 只保留当前仍存在的设备名，过滤掉已移除设备的旧状态
            const filtered = {};
            for (let name of currentNames) {
                if (saved.hasOwnProperty(name)) {
                    filtered[name] = saved[name];
                }
            }
            return filtered;
        } catch(e) { return {}; }
    }

    // 取消勾选设备时，清除其图例缓存，下次重新勾选时默认显示曲线
    function clearLegendStateForRemovedMacs(removedMacs) {
        if (!removedMacs || removedMacs.length === 0) return;
        try {
            // MAC → 设备名 映射
            const namesToRemove = new Set();
            for (let mac of removedMacs) {
                const dev = allDevices.find(d => d.mac === mac);
                if (dev) namesToRemove.add(dev.devname);
            }
            if (namesToRemove.size === 0) return;

            const stored = localStorage.getItem(LEGEND_STATE_KEY);
            if (!stored) return;
            const allState = JSON.parse(stored);
            let changed = false;
            for (let chartKey of ['upload', 'download']) {
                if (allState[chartKey]) {
                    for (let name of namesToRemove) {
                        if (allState[chartKey].hasOwnProperty(name)) {
                            delete allState[chartKey][name];
                            changed = true;
                        }
                    }
                }
            }
            if (changed) {
                localStorage.setItem(LEGEND_STATE_KEY, JSON.stringify(allState));
            }
        } catch(e) {}
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function startTickTimer() {
        if (tickTimer) clearInterval(tickTimer);
        tickTimer = setInterval(() => { tickAllDurations(); }, 1000);
    }

    function restoreSelectedMacs() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const arr = JSON.parse(stored);
                if (Array.isArray(arr)) selectedMacs = new Set(arr);
            } catch(e) {}
        }
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (!overlay) return;
        overlay.classList.add('fade-out');
        overlay.addEventListener('transitionend', () => {
            overlay.classList.add('hidden');
        }, { once: true });
    }

    async function startAutoRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        await fetchAllData();  // 首次加载等待完成后再隐藏 loading
        hideLoading();
        refreshTimer = setInterval(() => { fetchAllData(); }, {{ fetch_interval * 1000 }});
    }

    document.addEventListener('DOMContentLoaded', async () => {
        restoreSelectedMacs();
        restoreTimeRange();
        restoreLinkChartsState();
        initCharts();
        bindTimeSelector();
        bindLinkChartsCheckbox();
        bindSelectAllCheckbox();
        startTickTimer();
        await startAutoRefresh();
    });

    // ---------- QoS 限速弹窗 ----------
    let qosModalMac = '';

    function openQosModal(mac) {
        qosModalMac = mac;
        const dev = allDevices.find(d => d.mac === mac);
        if (!dev) return;
        document.getElementById('qosModalDevName').textContent = dev.devname;
        document.getElementById('qosModalEnabled').checked = (dev.qos_enabled === 1);
        // 直接设置 select 值（Kbps），匹配不到则清空
        document.getElementById('qosModalUp').value = dev.qos_max_upload_kbps || '';
        document.getElementById('qosModalDown').value = dev.qos_max_download_kbps || '';
        // 根据复选框状态显示/隐藏速率行
        toggleQosSpeedRows();
        document.getElementById('qosModal').classList.add('show');
    }

    function toggleQosSpeedRows() {
        const show = document.getElementById('qosModalEnabled').checked;
        const display = show ? 'flex' : 'none';
        document.getElementById('qosRowUp').style.display = display;
        document.getElementById('qosRowDown').style.display = display;
        document.getElementById('qosRowDuration').style.display = display;
    }

    function closeQosModal() {
        document.getElementById('qosModal').classList.remove('show');
    }

    async function saveQosLimit() {
        const enabled = document.getElementById('qosModalEnabled').checked;
        const upKbps = parseInt(document.getElementById('qosModalUp').value) || 0;
        const downKbps = parseInt(document.getElementById('qosModalDown').value) || 0;
        const durationMin = parseInt(document.getElementById('qosModalDuration').value) || 0;
        try {
            const resp = await axios.post('/api/qos-limit', {
                mac: qosModalMac,
                enabled: enabled,
                max_upload_kbps: upKbps,
                max_download_kbps: downKbps,
                duration_minutes: durationMin
            });
            if (resp.data.status === 'ok') {
                closeQosModal();
                fetchAllData();  // 刷新数据
            } else {
                alert('保存失败: ' + (resp.data.message || '未知错误'));
            }
        } catch (err) {
            console.error('QoS保存失败', err);
            alert('保存失败，请检查网络连接');
        }
    }

    // 弹窗事件绑定（DOM 加载完成后执行）
    document.addEventListener('DOMContentLoaded', function() {
        // 点击弹窗遮罩关闭
        document.getElementById('qosModal').addEventListener('click', function(e) {
            if (e.target === this) closeQosModal();
        });
    });
    // 按 Esc 关闭弹窗（capture 阶段拦截，避免被 select 等组件吞掉）
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) {
            closeQosModal();
        }
    }, true);
</script>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>

    <!-- QoS 限速配置弹窗 -->
    <div class="modal-overlay" id="qosModal">
        <div class="modal-box">
            <h3>⚙️ 限速配置 - <span id="qosModalDevName"></span></h3>
            <div class="modal-row">
                <label for="qosModalEnabled">上网限速</label>
                <input type="checkbox" id="qosModalEnabled" onchange="toggleQosSpeedRows()">
            </div>
            <div class="modal-row" id="qosRowUp">
                <label>最大上传</label>
                <select id="qosModalUp">
                    <option value="10">1.25 KB/s</option>
                    <option value="2048">256 KB/s</option>
                    <option value="4096">512 KB/s</option>
                    <option value="8192">1 MB/s</option>
                    <option value="32768">4 MB/s</option>
                    <option value="65536">8 MB/s</option>
                </select>
            </div>
            <div class="modal-row" id="qosRowDown">
                <label>最大下载</label>
                <select id="qosModalDown">
                    <option value="10">1.25 KB/s</option>
                    <option value="2048">256 KB/s</option>
                    <option value="4096">512 KB/s</option>
                    <option value="8192">1 MB/s</option>
                    <option value="32768">4 MB/s</option>
                    <option value="65536">8 MB/s</option>
                </select>
            </div>
            <div class="modal-row" id="qosRowDuration">
                <label>限速时长</label>
                <select id="qosModalDuration">
                    <option value="10">10分钟</option>
                    <option value="30">30分钟</option>
                    <option value="60">1小时</option>
                    <option value="120">2小时</option>
                    <option value="300">5小时</option>
                    <option value="720">12小时</option>
                    <option value="1440">1天</option>
                    <option value="2880">2天</option>
                    <option value="10080">一周</option>
                    <option value="0">永久</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeQosModal()">取消</button>
                <button class="btn-save" onclick="saveQosLimit()">保存</button>
            </div>
        </div>
    </div>
</body>
